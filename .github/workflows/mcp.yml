# mcp suite — the local MCP server (@devdigest/mcp).
# Tool handlers and the services behind them, against a mock ApiPort: no live
# DevDigest API, no MCP SDK in the loop, no network. Uses npm (package-lock.json).
#
# server/src/vendor/shared/** is in the path filter because mcp aliases
# @devdigest/shared to it at type-check time (src/types.ts, import type only).
name: mcp

on:
  push:
    branches: [main]
    paths:
      - 'mcp/**'
      - 'server/src/vendor/shared/**'
      - '.github/workflows/mcp.yml'
  pull_request:
    paths:
      - 'mcp/**'
      - 'server/src/vendor/shared/**'
      - '.github/workflows/mcp.yml'

permissions:
  contents: read

concurrency:
  group: mcp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp/package-lock.json

      - run: npm ci

      - run: npx tsc --noEmit -p tsconfig.json

      - run: npx vitest run

      # The onion boundary, mechanically. Without this step the ruleset is a file
      # nobody runs: a tool handler could import the HTTP client and CI would be green.
      - name: onion boundary (dependency-cruiser)
        run: npm run arch:check

      # The two failure modes dependency-cruiser CANNOT see, because they are globals
      # and not import edges: a `console.log` (which corrupts the JSON-RPC frame on
      # stdout and surfaces only as an unreadable "failed to connect"), and `fetch()` /
      # `process.env` leaking into the pure domain ring.
      - name: stdout + domain purity
        run: npm run purity:check
